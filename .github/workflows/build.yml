name: Build TrollStore App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Build iOS App
      run: |
        # 设置项目配置
        plutil -replace CODE_SIGNING_REQUIRED -bool NO Zomigle.xcodeproj/project.pbxproj
        plutil -replace CODE_SIGNING_ALLOWED -bool NO Zomigle.xcodeproj/project.pbxproj
        
        # 构建应用
        xcodebuild -project Zomigle.xcodeproj -scheme Zomigle -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_ALLOWED=NO
        
        # 创建 IPA
        cd build/Release-iphoneos
        mkdir Payload
        cp -r Zomigle.app Payload/
        zip -r Zomigle.tipa Payload
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Zomigle
        path: build/Release-iphoneos/Zomigle.tipa
